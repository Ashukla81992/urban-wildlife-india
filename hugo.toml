baseURL = "/"
languageCode = "en-gb"
title = "Urban Wildlife India"

[params]
  description = "A curated gallery of urban wildlife photography across India."
  author = "@urbanwildlifeindia"
  watermark = "@urbanwildlifeindia"
  # PhotoSwipe lightbox version
  photoswipeVersion = "5.4.3"
  # Optional: Search Console → HTML *tag* method only — paste the exact `content="..."` value
  # Google gives you (not the same as the HTML *file* body). Leave empty to omit the meta tag.
  googleSiteVerification = ""

[markup.goldmark.renderer]
  unsafe = true

[imaging]
  quality = 85
  resampleFilter = "Lanczos"

[outputs]
  home = ["HTML"]
  page = ["HTML"]
  section = ["HTML"]

[security]
  [security.funcs]
    getenv = ["^HUGO_"]
