<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
  <meta name="author" content="{{ .Site.Params.author }}" />
  <meta property="og:title" content="{{ .Title }} | {{ .Site.Title }}" />
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
  {{ with .Params.cover_image }}
  <meta property="og:image" content="{{ . | absURL }}" />
  {{ end }}
  <title>{{ .Title }} | {{ .Site.Title }}</title>

  {{/* PhotoSwipe CSS */}}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photoswipe@5.4.3/dist/photoswipe.min.css" />

  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
</head>
<body>
  {{ partial "header.html" . }}

  <main id="main-content">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <script src="{{ "js/gallery.js" | relURL }}" defer></script>
  <script src="{{ "js/shield.js" | relURL }}" defer></script>
</body>
</html>
