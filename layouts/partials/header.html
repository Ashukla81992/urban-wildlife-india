<header class="site-header">
  <nav class="nav-inner">
    <a href="{{ .Site.Home.RelPermalink }}" class="site-logo">
      <span class="logo-mark">◈</span>
      <span class="logo-text">{{ .Site.Title }}</span>
    </a>
    <ul class="nav-links">
      <li><a href="{{ .Site.Home.RelPermalink }}" {{ if .IsHome }}class="active"{{ end }}>Home</a></li>
      <li><a href="{{ "gallery/" | relURL }}" {{ if eq .Section "gallery" }}class="active"{{ end }}>Gallery</a></li>
      <li><a href="{{ "about/" | relURL }}" {{ if and .IsPage (eq .Title "About") }}class="active"{{ end }}>About</a></li>
    </ul>
    <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>
</header>
