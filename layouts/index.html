{{ define "main" }}
<section class="hero">
  <div class="hero-text">
    <h1 class="hero-title">Urban<br /><em>Wildlife</em></h1>
    <p class="hero-sub">India — through the lens</p>
    <a href="{{ "/gallery/" | relURL }}" class="hero-cta">Explore Gallery</a>
  </div>
  <div class="hero-scroll-hint" aria-hidden="true">scroll</div>
</section>

<section class="featured-section">
  <h2 class="section-label">Recent Work</h2>
  <div class="masonry-grid" id="featured-gallery">
    {{ range first 9 (where .Site.RegularPages "Section" "gallery") }}
      {{ partial "gallery-card.html" . }}
    {{ end }}
  </div>
  <div class="section-more">
    <a href="{{ "/gallery/" | relURL }}" class="btn-outline">View All →</a>
  </div>
</section>
{{ end }}
